name: CI Pipeline

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: flatt-security/setup-takumi-guard-npm@v1

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint

  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: flatt-security/setup-takumi-guard-npm@v1

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build
